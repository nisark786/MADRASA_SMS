name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Go to application directory
            cd /var/www/students_data_store
            
            # 2. Pull latest code
            git pull origin main
            
            # 3. Pull newest containers and build
            docker-compose -f docker-compose.yml pull
            docker-compose -f docker-compose.yml build
            
            # 4. Restart deployment with zero downtime (creates new containers before stopping old ones)
            docker-compose -f docker-compose.yml up -d --remove-orphans
            
            # 5. Run Database Migrations safely
            docker exec students_backend alembic upgrade head
            
            # 6. Cleanup unused docker images to save disk space
            docker image prune -af
