
services:
  redis:
    image: redis:7-alpine
    container_name: students_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: students_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: students_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/students_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SECRET_KEY: ${SECRET_KEY:-your-secure-production-secret-key-here}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      - redis
      - jaeger
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: students_jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_HTTP_HOST_PORT=:4318
      - COLLECTOR_OTLP_HTTP_ALLOWED_ORIGINS=http://localhost:5173
      - COLLECTOR_OTLP_HTTP_ALLOWED_HEADERS=content-type,x-requested-with
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:


