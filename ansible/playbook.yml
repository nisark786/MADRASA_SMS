---
- name: Setup Server and Install Docker
  hosts: webservers
  become: yes
  
  tasks:
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist
        
    - name: Install required system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - git
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker APT repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        state: present

    - name: Install Docker and Compose
      apt:
        name:
          - docker-ce
          - docker-compose-plugin
        state: present

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Create project directory
      file:
        path: /var/www/students_data_store
        state: directory
        owner: ubuntu
        group: ubuntu

    # In a real pipeline, pulling code happens via SSH keys from Github, 
    # but initially, we just make sure the destination folder is ready so GitHub Actions can deploy into it.
